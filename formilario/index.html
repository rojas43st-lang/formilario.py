<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>

    <h2>Inicio de Sesión</h2>

    <form action="/login" method="post">

        <input
            type="text"
            name="usuario"
            placeholder="Usuario"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required
        >

        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>

</body>
</html>
